<div class="card h-100 shadow-sm">
    <img *ngIf="product.imageUrl" class="card-img-top" [src]="product.imageUrl" alt="{{ product.title }}">
    <div class="card-body">
        <h5 *ngIf="product.title" class="card-title">{{ product.title }}</h5>
        <p class="card-text">{{ product.price | currency:'USD':'symbol' }}</p>
    </div>
    <div class="card-footer ">
        <a *ngIf="showActions" href="#" class="btn btn-primary w-100">Add To Cart</a>
    </div>
</div>
