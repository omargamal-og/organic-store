<div class="row">
    <div class="col-md-6">
    <form #f="ngForm" (ngSubmit)="save(f.value)">
    <div class="mb-3">
        <label for="title">Title</label>
        <input #title="ngModel" [(ngModel)]="product.title" name="title" id="title" type="text" class="form-control" required>
        <div class="alert alert-danger" *ngIf="title.touched && title.invalid">
            Title field is required.
        </div>
    </div>
    <div class="mb-3">
        <label for="price">Price</label>
        <div class="input-group">
            <span class="input-group-text">$</span>
            <input #price="ngModel" [(ngModel)]="product.price" name ="price" id="price" type="number" class="form-control" required [min]="0">
        </div>
        <div class="alert alert-danger" *ngIf="price.touched && price.invalid">
            <div *ngIf="price.errors?.['required']">Price field is required.</div>
            <div *ngIf="price.errors?.['min']">Price should be 0 or higher.</div>
        </div>
    </div>
    <div class="mb-3">
        <label for="category">Category</label>
        <select #category="ngModel" [(ngModel)]="product.category" name="category" id="category" class="form-control" required>
            <option value=""></option>
            <option *ngFor="let c of categories$ | async" [value]="c.$key">
                {{ c.name }}
            </option>
        </select>
        <div class="alert alert-danger" *ngIf="category.touched && category.invalid">
            Category is required.
        </div>
    </div>
    <div class="mb-3">
        <label for="imageUrl">imageUrl</label>
        <input #imageUrl="ngModel" [(ngModel)]="product.imageUrl" name="imageUrl" id="imageUrl" type="text" class="form-control" required pattern="https?://.+">
        <div class="alert alert-danger" *ngIf="imageUrl.touched && imageUrl.invalid">
            <div *ngIf="imageUrl.errors?.['required']">imageUrl is required.</div>
            <div *ngIf="imageUrl.errors?.['pattern']">Please enter a valid URL.</div>
        </div>
    </div>
    <div class="mt-3">
        <button class="btn btn-primary me-2">
            Save
        </button>

        <button
            type="button"
            class="btn btn-danger"
            (click)="delete()">
            Delete
        </button>
    </div>
    </form>
    </div>

    <div class="col-md-6 d-flex justify-content-center align-items-start">
        <product-card [product]="product" [show-actions]="false"></product-card>
    </div>
</div>
